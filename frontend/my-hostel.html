<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hostel - Hostel Mess Finder</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Hostel Mess Finder</h1>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="browse.html">Browse Messes</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-wrapper">
            <aside class="dashboard-sidebar">
                <div class="user-profile">
                    <div class="user-avatar" id="sidebarAvatar">User</div>
                    <h3 id="userName">User Name</h3>
                    <p id="userEmail" style="font-size: 0.85rem;">email@example.com</p>
                </div>

                <nav class="dashboard-menu">
                    <a href="index.html" class="menu-item">
                        <span class="icon-dot"></span> Home
                    </a>
                    <a href="dashboard.html" class="menu-item">
                        <span class="icon-dot"></span> Dashboard Home
                    </a>
                    <a href="browse.html" class="menu-item">
                        <span class="icon-dot"></span> Browse New Messes
                    </a>
                    <a href="review.html" class="menu-item" id="writeReviewSidebarLink" style="display:none;">
                        <span class="icon-dot"></span> Write Review
                    </a>
                    <a href="dashboard.html?tab=reviewsTab" class="menu-item">
                        <span class="icon-dot"></span> My Reviews
                    </a>
                    <a href="profile.html" class="menu-item">
                        <span class="icon-dot"></span> My Profile
                    </a>
                    <a href="#" class="menu-item">
                        <span class="icon-dot"></span> Notifications
                    </a>
                    <a href="my-hostel.html" class="menu-item active">
                        <span class="icon-dot"></span> My Hostel
                    </a>
                </nav>
            </aside>

            <main class="dashboard-content">
                <h2>My Hostel</h2>
                <div id="myHostelContent">
                    <div class="no-content">
                        <p>Loading hostel information...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 Hostel Mess Finder. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            protectRoute();
            const user = await getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                if (user.photo_url) {
                    document.getElementById('sidebarAvatar').innerHTML = `<img src="${user.photo_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                }

                if (user.joinedMessId) {
                    loadHostelDetails(user.joinedMessId, user.isVerified);
                } else {
                    document.getElementById('myHostelContent').innerHTML = `
                        <div class="no-content">
                            <p>You haven't joined any hostel yet.</p>
                            <a href="browse.html" class="btn btn-primary" style="margin-top: 15px;">Browse Messes</a>
                        </div>
                    `;
                }

                if (user.joinedMessId && user.isVerified) {
                    document.getElementById('writeReviewSidebarLink').style.display = 'block';
                }
            }
        });

        async function loadHostelDetails(messId, isVerified) {
            try {
                const res = await fetch(`${API_BASE_URL}/messes/${messId}`);
                const data = await res.json();
                if (data.success) {
                    const mess = data.data;
                    const statusText = isVerified ? 'Verified' : 'Verification Pending';
                    const statusColor = isVerified ? '#10b981' : '#f59e0b';

                    document.getElementById('myHostelContent').innerHTML = `
                        <div class="card" style="border-left: 5px solid ${statusColor};">
                            <div class="card-body">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div>
                                        <h3 style="margin-bottom: 5px;">${mess.name}</h3>
                                        <p style="color: #666; font-size: 0.9rem;">${mess.location}</p>
                                    </div>
                                    <div style="text-align: right;">
                                        <span style="background: ${statusColor}; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">${statusText}</span>
                                    </div>
                                </div>
                                
                                <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                    <div class="info-item">
                                        <label style="font-weight: 700; color: #64748b; font-size: 0.8rem; text-transform: uppercase;">Monthly Price</label>
                                        <p>₹${mess.monthlyPrice}</p>
                                    </div>
                                    <div class="info-item">
                                        <label style="font-weight: 700; color: #64748b; font-size: 0.8rem; text-transform: uppercase;">Food Type</label>
                                        <p>${mess.foodType}</p>
                                    </div>
                                    <div class="info-item">
                                        <label style="font-weight: 700; color: #64748b; font-size: 0.8rem; text-transform: uppercase;">Owner</label>
                                        <p>${mess.ownerId.name}</p>
                                    </div>
                                    <div class="info-item">
                                        <label style="font-weight: 700; color: #64748b; font-size: 0.8rem; text-transform: uppercase;">Contact</label>
                                        <p>${mess.ownerId.phone}</p>
                                    </div>
                                </div>

                                <div style="margin-top: 25px; display: flex; gap: 10px;">
                                    ${isVerified ? '<a href="review.html" class="btn btn-primary">Give Review</a>' : ''}
                                    <button class="btn btn-outline" onclick="window.location.href='mess-details.html?id=${mess._id}'">View Details</button>
                                    <button class="btn btn-outline" onclick="leaveHostel('${mess._id}')" style="color: #ef4444; border-color: #ef4444;">Leave Hostel</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('myHostelContent').innerHTML = '<p>Error loading hostel details.</p>';
            }
        }

        async function leaveHostel(messId) {
            if (!confirm('Are you sure you want to leave this hostel? Your verification status will be reset.')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/messes/${messId}/leave`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                if (data.success) {
                    const user = JSON.parse(localStorage.getItem('user'));
                    user.joinedMessId = null;
                    user.isVerified = false;
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.reload();
                } else {
                    alert(data.message || 'Error leaving hostel.');
                }
            } catch (err) {
                alert('Server error.');
            }
        }
    </script>
</body>
</html>
